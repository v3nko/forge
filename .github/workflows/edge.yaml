name: Edge images

on:
  push:
    branches:
      - dev
    paths:
      - images/**
  workflow_dispatch:
    inputs:
      images:
        description: "Images to publish: all or comma-separated image names"
        required: true
        default: all

permissions:
  contents: read
  packages: write

jobs:
  plan:
    name: Plan changed images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.plan.outputs.images }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Plan image set
        id: plan
        shell: bash
        run: |
          set -eu
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            images="${{ inputs.images }}"
          else
            compare_ref="${{ github.event.before }}"
            if [[ -z "${compare_ref}" || "${compare_ref}" =~ ^0+$ ]]; then
              compare_ref="HEAD^"
            fi
            git diff --name-only "${compare_ref}" HEAD > changed-files.txt
            images="$(python3 .github/scripts/plan-images.py --lane edge --changed-files changed-files.txt --output images)"
          fi
          echo "images=${images}" >> "${GITHUB_OUTPUT}"
          echo "Image set: ${images:-none}"

  publish:
    needs:
      - plan
    if: needs.plan.outputs.images != ''
    uses: ./.github/workflows/_images.yaml
    with:
      lane: edge
      images: ${{ needs.plan.outputs.images }}
