name: Images

on:
  workflow_call:
    inputs:
      lane:
        type: string
        required: true
      images:
        type: string
        required: true
      version:
        type: string
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ vars.FORGE_IMAGE_NAMESPACE }}

jobs:
  plan:
    name: Plan images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate inputs
        shell: bash
        run: |
          set -eu
          test -n "${IMAGE_NAMESPACE}"
          case "${IMAGE_NAMESPACE}" in
            ghcr.io/*) ;;
            *) echo "FORGE_IMAGE_NAMESPACE must start with ghcr.io/" >&2; exit 1 ;;
          esac
          case "${{ inputs.lane }}" in
            edge|stable) ;;
            *) echo "Unsupported lane: ${{ inputs.lane }}" >&2; exit 1 ;;
          esac

      - name: Plan image matrix
        id: plan
        shell: bash
        run: |
          set -eu
          matrix="$(python3 .github/scripts/plan-images.py --images '${{ inputs.images }}' --lane '${{ inputs.lane }}' --version '${{ inputs.version }}' --namespace "${IMAGE_NAMESPACE}")"
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build images
    runs-on: ubuntu-latest
    needs:
      - plan
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build images
        shell: bash
        env:
          IMAGE_MATRIX: ${{ needs.plan.outputs.matrix }}
        run: |
          set -eu
          jq -c '.include[]' <<< "${IMAGE_MATRIX}" | while read -r image; do
            name="$(jq -r '.name' <<< "${image}")"
            dockerfile="$(jq -r '.dockerfile' <<< "${image}")"
            args=()
            while IFS='=' read -r key value; do
              if [[ -n "${key}" ]]; then
                args+=(--build-arg "${key}=${value}")
              fi
            done < <(jq -r '.build_args | to_entries[]? | "\(.key)=\(.value)"' <<< "${image}")
            docker build --file "${dockerfile}" "${args[@]}" --tag "forge/${name}:ci" .
          done

  deploy:
    name: Deploy images
    runs-on: ubuntu-latest
    needs:
      - plan
      - build
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish images
        shell: bash
        env:
          IMAGE_MATRIX: ${{ needs.plan.outputs.matrix }}
        run: |
          set -eu
          jq -c '.include[]' <<< "${IMAGE_MATRIX}" | while read -r image; do
            dockerfile="$(jq -r '.dockerfile' <<< "${image}")"
            args=()
            while IFS='=' read -r key value; do
              if [[ -n "${key}" ]]; then
                args+=(--build-arg "${key}=${value}")
              fi
            done < <(jq -r '.deploy_build_args | to_entries[]? | "\(.key)=\(.value)"' <<< "${image}")
            while read -r tag; do
              args+=(--tag "${tag}")
            done < <(jq -r '.tags[]' <<< "${image}")
            docker buildx build --file "${dockerfile}" "${args[@]}" --push .
          done
