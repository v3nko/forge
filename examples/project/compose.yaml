name: forge-project

services:
  dev:
    image: ${FORGE_IMAGE:-forge/ansible:latest}
    ports:
      - "${FORGE_SSH_BIND:-}:${FORGE_SSH_PORT:-2222}:22"
    environment:
      FORGE_AUTHORIZED_KEYS: ${FORGE_AUTHORIZED_KEYS:-}
    volumes:
      - forge-project-home:/home
      - ./workspace:/workspace
    init: true
    restart: unless-stopped

volumes:
  forge-project-home:
